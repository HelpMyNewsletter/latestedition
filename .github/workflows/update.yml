name: Update Latest Edition

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/generate_latest.py

      - name: Generate latest index.html
        run: |
          python scripts/generate_latest.py

      - name: Confirm generated output
        run: |
          echo "Checking generated index.html..."

          if grep -q "Viewing note" index.html; then
            echo "Notice block found"
          else
            echo "Notice block missing"
            exit 1
          fi

          if grep -q "Turn AI Into Extra Income" index.html; then
            echo "Ad block still found in generated index.html"
            exit 1
          else
            echo "Ad block successfully removed"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html scripts/generate_latest.py

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update latest edition"
          git push origin HEAD:main
