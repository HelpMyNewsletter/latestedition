name: Update Latest Edition

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-latest-edition
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/generate_latest.py

      - name: Generate latest index.html
        run: |
          python scripts/generate_latest.py

      - name: Show generated output preview
        run: |
          echo "===== FIRST 80 LINES OF index.html ====="
          sed -n '1,80p' index.html
          echo "===== SEARCH CHECKS ====="
          grep -n "Viewing note" index.html || true
          grep -n "Turn AI Into Extra Income" index.html || true
          grep -n "Field Notes" index.html || true
          grep -n "max-width: 600px" index.html || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html scripts/generate_latest.py

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update latest edition"
          git push origin HEAD:main
